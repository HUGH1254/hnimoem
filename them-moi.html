<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>them moi</title>
    <!-- Custom Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/swiper.min.css" />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="add-new-service">
      <div class="add-new-service__title">
        <p class="txt">Thêm mới</p>
        <div class="icon-18 icon-close">
          <img src="assets/icon-close-black.svg" alt="back" class="image-icon" />
        </div>
      </div>
      <div class="add-new-service__input">
        <div class="main-section__product-bar--info-input input-type">
                <p class="main-section__product-bar--info-input-text">Loại</p>
                <select name="" id="--type-add" class="--input --type">
                  <option value="Việt nam">Việt nam</option>
                  <option value="Việt nam">Việt nam</option>
                  <option value="Việt nam">Việt nam</option>
                  <option value="Việt nam">Việt nam</option>
                  <option value="Việt nam">Việt nam</option>
                </select>
        </div>
        <div class="main-section__product-bar--info-input input-service-name">
          <p class="main-section__product-bar--info-input-text">
            Tên <span>(0/16)</span>
          </p>
          <input
            type="text"
            class="--input --service-name"
            placeholder="Nhập nội dung"
          />
        </div>
        <div class="main-section__product-bar--info-input input-price-service">
          <p class="main-section__product-bar--info-input-text">
            Giá dịch vụ <span>(VND)</span>
          </p>
          <input
            type="text"
            class="--input --price-service"
            placeholder="Nhập số tiền"
          />
        </div>
        <div class="btn-draft-save">
            <button class="--draft btn">Hủy</button>
            <button class="--save btn">Lưu</button>
        </div>
      </div>
    </div>
  </body>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/jquery-3.4.1.min.js"></script>
  <script src="js/swiper.min.js"></script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Trang danh sách</title>
    <!-- Custom Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/swiper.min.css" />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__left">
        <div class="info-company">
          <div class="info-company--logo icon-30">
            <a href="" id="info-company--name">Logo</a>
            <img src="" alt="ảnh logo công ty" id="info-company--upload" class="image-icon">
          </div>
          <div class="info-company--name-company">
            <select name="name-company" id="company" class="truncate-text">
              <option value="Công ty cổ phần nhó nho nhò 1">
                Công ty cổ phần nhó nho nhò 1
              </option>
              <option value="Công ty cổ phần nhó nho nhò 2">
                Công ty cổ phần nhó nho nhò 2
              </option>
              <option value="Công ty cổ phần nhó nho nhò 3">
                Công ty cổ phần nhó nho nhò 3
              </option>
              <option value="Công ty cổ phần nhó nho nhò 4">
                Công ty cổ phần nhó nho nhò 4
              </option>
              <option value="Công ty cổ phần nhó nho nhò 5">
                Công ty cổ phần nhó nho nhò 5
              </option>
            </select>
          </div>
        </div>
        <nav class="header__left--text">
          <a href="">Trang chủ</a>
          <a href="">Làm việc</a>
          <a href="">Dashboard</a>
          <a href="">Báo cáo</a>
          <a href="">Lưu trữ</a>
        </nav>
      </div>
      <div class="header__right">
            <div class="header__right--check-in">
                <div class="icon-clock icon-14">
                    <img src="assets/icon-clock-black.svg" alt="check-in" class="image-icon">
                </div>
                <p class="header__right--text">Check-in</p>
                <div class="icon-14 icon-v">
                    <img src="assets/icon-v-grey.svg" alt="" class="image-icon">
                </div>
            </div>
            <div class="header__right--icon">
                <div class="icon-18 icon-chat"><img src="assets/icon-chat-black.svg" alt="" class="image-icon"></div>
                <div claas="icon-18 icon-notif"><img src="assets/icon-notif-black.svg" alt="" class="image-icon"></div>
                <div class="icon-18 icon-setting"><img src="assets/icon-setting-black.svg" alt="" class="image-icon"></div>
            </div>
            <div class="header__right--avt icon-30">
                <img src="img/a1.png" alt="avt" class="image">
            </div>
      </div>
    </header>
    <main class="main-section">
      <section class="main-section__product"></section>
      <section class="main-section__info-product"></section>
    </main>
  </body>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/jquery-3.4.1.min.js"></script>
  <script src="js/swiper.min.js"></script>
</html>
